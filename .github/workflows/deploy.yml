name: Deploy to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' # Or 10.0.x
        
    - name: Publish
      run: dotnet publish src/NexusERP.API/NexusERP.API.csproj -c Release -o ./publish
      
